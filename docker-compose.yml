services:
  triton:
    build:
      context: .
      dockerfile: triton/Dockerfile
    image: pedestrian_triton:local
    container_name: pedestrian_triton
    ports:
      - "8001:8000"   # HTTP inference
      - "8002:8001"   # gRPC inference
      - "8003:8002"   # metrics
    volumes:
      - ./triton/model_repository:/models
      - ./stage1_inference:/stage1_inference:ro
      - ./stage2_inference:/stage2_inference:ro
      - ./data:/data:ro
    command: >
      tritonserver
      --model-repository=/models
      --log-verbose=1
      --strict-model-config=false
      --exit-on-error=false
      --pinned-memory-pool-byte-size=0
    environment:
      - CUDA_VISIBLE_DEVICES=-1
    shm_size: "4g"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pedestrian_sensing_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: pedestrian_sensing_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
