services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: pedestrian_triton
    ports:
      - "8001:8000"   # HTTP inference
      - "8002:8001"   # gRPC inference
      - "8003:8002"   # metrics
    volumes:
      - ./triton/model_repository:/models
    command: >
      tritonserver
      --model-repository=/models
      --log-verbose=1
      --strict-model-config=false
    shm_size: "256m"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pedestrian_sensing_backend
    environment:
      AUTO_DOWNLOAD_MODEL_WEIGHTS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: pedestrian_sensing_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
